# GoReleaser config for the TypstPad CLI (client + MCP).
# Cut a release by pushing a tag:  git tag v0.1.0 && git push origin v0.1.0
# The default build has no bundled web UI so the CLI stays small (the server
# ships as a Docker image, built with -tags withui). See release.yml.
version: 2

project_name: typstpad

before:
  hooks:
    - go mod tidy
    # Default build has no bundled SPA, so no web build / dist is needed here.
    - go test ./...

builds:
  - id: typstpad
    main: ./cmd/typstpad
    binary: typstpad
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: typstpad
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"

homebrew_casks:
  - name: typstpad
    repository:
      owner: ladderlogix
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/ladderlogix/typstpad"
    description: "CLI + MCP client for TypstPad, the self-hosted collaborative Typst editor"
    # Requires the ladderlogix/homebrew-tap repo + a PAT in HOMEBREW_TAP_GITHUB_TOKEN.
    # The binary is unsigned, so strip the macOS quarantine flag on install.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/typstpad"]
          end

release:
  prerelease: auto
  footer: |
    ## Install

    **Homebrew** (macOS/Linux):
    ```
    brew install ladderlogix/tap/typstpad
    ```

    **Go**:
    ```
    go install github.com/ladderlogix/typstpad/cmd/typstpad@latest
    ```

    Or grab a prebuilt binary from the assets above.
