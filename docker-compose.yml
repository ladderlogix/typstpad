services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      DATABASE_URL: postgres://typstpad:${DB_PASSWORD}@db:5432/typstpad?sslmode=disable
      SESSION_SECRET: ${SESSION_SECRET}
      COLLAB_SECRET: ${COLLAB_SECRET}
      COLLAB_URL: http://collab:8090
      APP_DEV_HTTP: "true"
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8080}
      DATA_DIR: /data
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid profile email}
      SIGNUP_ALLOWLIST: ${SIGNUP_ALLOWLIST:-}
      REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-TypstPad}
      MAX_PROJECTS_PER_USER: ${MAX_PROJECTS_PER_USER:-500}
      MAX_ASSET_MB_PER_USER: ${MAX_ASSET_MB_PER_USER:-1024}
      COMPILE_MAX_MEMORY_MB: ${COMPILE_MAX_MEMORY_MB:-2048}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
    volumes:
      - appdata:/data
    depends_on:
      db:
        condition: service_healthy
      collab:
        condition: service_started
    networks: [internal]

  collab:
    build: ./collab
    restart: unless-stopped
    environment:
      COLLAB_SECRET: ${COLLAB_SECRET}
      APP_INTERNAL_URL: http://app:8080
    networks: [internal]

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: typstpad
      POSTGRES_USER: typstpad
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U typstpad"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [internal]

  # ---- Observability (metrics) ----
  prometheus:
    image: prom/prometheus:v3.1.0
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /opt/typstpad/metrics-token:/etc/prometheus/token:ro
      - promdata:/prometheus
    depends_on: [app]
    networks: [internal]

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"   # localhost only; reached via the Cloudflare tunnel
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3001}
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      # SSO: auto-login from the Cloudflare Access identity header. Grafana is
      # only reachable via the tunnel (localhost bind), so the header is trusted
      # from the internal/docker source. The local admin login stays as a fallback.
      GF_AUTH_PROXY_ENABLED: "true"
      GF_AUTH_PROXY_HEADER_NAME: "Cf-Access-Authenticated-User-Email"
      GF_AUTH_PROXY_HEADER_PROPERTY: "username"
      GF_AUTH_PROXY_AUTO_SIGN_UP: "true"
      GF_AUTH_PROXY_HEADERS: "Email:Cf-Access-Authenticated-User-Email"
      GF_AUTH_PROXY_ENABLE_LOGIN_TOKEN: "false"
      GF_AUTH_PROXY_WHITELIST: "172.16.0.0/12,10.0.0.0/8,127.0.0.1/32"
      GF_USERS_AUTO_ASSIGN_ORG_ROLE: "${GRAFANA_SSO_ROLE:-Admin}"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    depends_on: [prometheus]
    networks: [internal]

  # ---- Dashy homepage (behind Cloudflare Access) ----
  dashy:
    image: lissy93/dashy:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:8080"   # localhost only; reached via the Cloudflare tunnel
    volumes:
      - ./deploy/dashy/conf.yml:/app/user-data/conf.yml:ro
    networks: [internal]

volumes:
  appdata:
  pgdata:
  promdata:
  grafanadata:

networks:
  internal:
