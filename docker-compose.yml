services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      DATABASE_URL: postgres://typstpad:${DB_PASSWORD}@db:5432/typstpad?sslmode=disable
      SESSION_SECRET: ${SESSION_SECRET}
      COLLAB_SECRET: ${COLLAB_SECRET}
      COLLAB_URL: http://collab:8090
      APP_DEV_HTTP: "true"
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8080}
      DATA_DIR: /data
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid profile email}
      SIGNUP_ALLOWLIST: ${SIGNUP_ALLOWLIST:-}
      REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-TypstPad}
      MAX_PROJECTS_PER_USER: ${MAX_PROJECTS_PER_USER:-500}
      MAX_ASSET_MB_PER_USER: ${MAX_ASSET_MB_PER_USER:-1024}
      COMPILE_MAX_MEMORY_MB: ${COMPILE_MAX_MEMORY_MB:-2048}
    volumes:
      - appdata:/data
    depends_on:
      db:
        condition: service_healthy
      collab:
        condition: service_started
    networks: [internal]

  collab:
    build: ./collab
    restart: unless-stopped
    environment:
      COLLAB_SECRET: ${COLLAB_SECRET}
      APP_INTERNAL_URL: http://app:8080
    networks: [internal]

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: typstpad
      POSTGRES_USER: typstpad
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U typstpad"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [internal]

volumes:
  appdata:
  pgdata:

networks:
  internal:
